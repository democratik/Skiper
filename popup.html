<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        width: 250px;
        padding: 15px;
        margin: 0;
        background-color: #ffffff;
      }
      h3 {
        margin-top: 0;
        font-size: 16px;
        color: #333;
        border-bottom: 1px solid #eee;
        padding-bottom: 8px;
      }
      .shortcut-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 15px;
        margin-top: 15px;
      }
      input {
        width: 40px;
        text-align: center;
        font-size: 14px;
        padding: 5px;
        text-transform: uppercase;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 8px;
        background: #e8eaed;
        color: #202124;
        border: 1px solid #dadce0;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
      }
      button:hover {
        background: #f1f3f4;
      }
      #status {
        color: #1a73e8;
        font-size: 12px;
        margin-top: 10px;
        text-align: center;
        min-height: 15px;
      }
    </style>
  </head>
  <body>
    <h3>Skipper Settings</h3>
    <p style="font-size: 12px; color: #666; margin: 0">
      Shortcut: Shift + <span style="color: red">Key</span>
    </p>

    <div class="shortcut-container">
      <label style="font-size: 14px">Your key:</label>
      <input type="text" id="shortcutKey" maxlength="1" placeholder="S" />
    </div>

    <button id="saveBtn">Save</button>
    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
